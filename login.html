{% extends "base.html" %}

{% block content %}

<style>

/* LOGIN PAGE ONLY BACKGROUND */

.cyber-grid{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,136,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,136,0.08) 1px, transparent 1px);
background-size:40px 40px;
animation:gridmove 20s linear infinite;
z-index:-1;
}

@keyframes gridmove{
0%{
background-position:0 0;
}
100%{
background-position:40px 40px;
}
}

/* SCANLINE EFFECT */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(0,0,0,0.15),
rgba(0,0,0,0.15) 2px,
transparent 2px,
transparent 4px
);
pointer-events:none;
z-index:1;
}

/* CENTER LOGIN */

.login-wrapper{
height:85vh;
display:flex;
align-items:center;
justify-content:center;
}

/* LOGIN CARD */

.login-card{
width:350px;
padding:35px;
background:#000;            
border:1px solid #00ff88;
border-radius:12px;
box-shadow:0 0 25px rgba(0,255,136,0.35);
text-align:center;
position:relative;
z-index:10;               
}

/* TITLE */

.login-card h2{
margin-bottom:20px;
color:#00ff88;
}

/* INPUT FIELDS */

.login-card input{
width:100%;
padding:10px;
margin-top:12px;
background:#111;
border:1px solid #00ff88;
border-radius:5px;
color:white;
}

/* BUTTON */

.login-card button{
margin-top:15px;
width:100%;
padding:10px;
background:#00ff88;
border:none;
border-radius:6px;
color:black;
font-weight:bold;
cursor:pointer;
}

.login-card button:hover{
box-shadow:0 0 15px #00ff88;
}

/* REGISTER LINK */

.login-card a{
color:#00ff88;
}

</style>


<!-- Animated Grid -->
<div class="cyber-grid"></div>


<div class="login-wrapper">

<div class="login-card">

<h2>Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>

<p>
Don't have an account?
<a href="{{ url_for('auth.register') }}">Register</a>
</p>

</div>

</div>

{% endblock %}
