
{% extends "base.html" %}

{% block content %}

<style>

/* CENTER REGISTER FORM */

.register-wrapper{
height:85vh;
display:flex;
align-items:center;
justify-content:center;
}

/* REGISTER CARD */

.register-card{
width:350px;
padding:35px;
background:#000;
border:1px solid #00ff88;
border-radius:12px;
box-shadow:0 0 25px rgba(0,255,136,0.35);
text-align:center;
}

/* TITLE */

.register-card h2{
color:#00ff88;
margin-bottom:20px;
}

/* INPUT FIELDS */

.register-card input{
width:100%;
padding:10px;
margin-top:12px;
background:#111;
border:1px solid #00ff88;
border-radius:5px;
color:white;
font-family:'Orbitron', sans-serif;
}

/* BUTTON */

.register-card button{
margin-top:18px;
width:100%;
padding:10px;
background:#00ff88;
border:none;
border-radius:6px;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.register-card button:hover{
box-shadow:0 0 15px #00ff88;
}

/* LINKS */

.register-card a{
color:#00ff88;
text-decoration:none;
}

.register-card a:hover{
text-shadow:0 0 5px #00ff88;
}

</style>


<div class="register-wrapper">

<div class="register-card">

<h2>Register</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Create Account</button>

</form>

<br>

<p>
Already have an account?
<a href="{{ url_for('auth.login') }}">Login</a>
</p>

</div>

</div>
