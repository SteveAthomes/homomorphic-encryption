<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PrivacyCloud</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:linear-gradient(180deg,#0a0f1c,#000000);
color:#e5e5e5;
font-family:'Orbitron',sans-serif;
}

/* CYBER GRID BACKGROUND */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,140,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,140,0.05) 1px, transparent 1px);
background-size:40px 40px;
pointer-events:none;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
border-bottom:1px solid rgba(0,255,140,0.2);
}

.logo{
font-family:'Press Start 2P';
color:#00ff88;
font-size:14px;
letter-spacing:2px;
}

.nav-links a{
margin-left:25px;
text-decoration:none;
color:#bbb;
font-size:14px;
}

.nav-links a:hover{
color:#00ff88;
}

/* PAGE WRAPPER */

.container{
width:85%;
margin:auto;
margin-top:40px;
}

/* CARDS */

.card{
background:rgba(20,20,25,0.7);
border:1px solid rgba(0,255,140,0.2);
border-radius:14px;
padding:30px;
backdrop-filter:blur(8px);
transition:0.25s;
}

.card:hover{
border:1px solid rgba(0,255,140,0.4);
box-shadow:0 0 15px rgba(0,255,140,0.15);
}

/* DASHBOARD GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
margin-top:40px;
}

/* STATS BAR */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:20px;
}

.stat-box{
background:rgba(20,20,25,0.6);
border:1px solid rgba(0,255,140,0.15);
padding:20px;
border-radius:12px;
text-align:center;
}

.stat-title{
font-size:12px;
color:#888;
}

.stat-value{
font-size:20px;
color:#00ff88;
margin-top:8px;
}

/* BUTTONS */

button{
background:#00ff88;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-family:'Orbitron';
}

button:hover{
box-shadow:0 0 10px #00ff88;
}

/* TABLES */

table{
width:100%;
border-collapse:collapse;
margin-top:25px;
text-align:center;
table-layout:fixed;
}

th{
padding:14px;
border-bottom:2px solid rgba(0,255,136,0.4);
color:#00ff88;
font-size:14px;
text-align:center;
}

td{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.1);
text-align:center;
font-size:14px;
}

tr:hover{
background:rgba(0,255,136,0.06);
}

th, td{
vertical-align:middle;
}

/* STORAGE BAR */

.storage-bar{
width:100%;
height:10px;
background:#111;
border-radius:10px;
margin-top:10px;
}

.storage-fill{
height:100%;
width:45%;
background:#00ff88;
border-radius:10px;
}

/* SECTION TITLES */

.section-title{
font-family:'Press Start 2P';
font-size:14px;
color:#00ff88;
margin-bottom:20px;
}

.analytics-table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.analytics-table th,
.analytics-table td{
padding:12px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.analytics-table th{
color:#00ff88;
font-weight:600;
}

.analytics-table tr:hover{
background:rgba(0,255,136,0.05);
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">PRIVACYCLOUD</div>

<div class="nav-links">
<a href="{{ url_for('dashboard.dashboard') }}">Home</a>
<a href="{{ url_for('dashboard.storage') }}">Storage</a>
<a href="{{ url_for('dashboard.analytics_home') }}">Analytics</a>
<a href="{{ url_for('dashboard.finance_home') }}">Finance</a>

<!-- 🔥 FIXED BREACH BUTTON -->
<a href="{{ url_for('dashboard.breach_simulation') }}">⚠ Breach</a>

<!-- 🔥 EXIT BREACH -->
<a href="{{ url_for('dashboard.exit_breach') }}">Normal</a>

<a href="{{ url_for('auth.logout') }}">Logout</a>
</div>

</div>

<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
